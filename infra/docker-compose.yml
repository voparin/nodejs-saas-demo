services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d appdb"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
  
  api:
    image: node:20-alpine
    working_dir: /workspace
    volumes:
      - ../apps/api:/workspace
    command: sh -c "npm install && npm run start:dev"
    environment:
      PORT: "3000"
      DATABASE_URL: "postgresql://app:app@postgres:5432/appdb"
      REDIS_URL: "redis://redis:6379"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  py-analytics:
    image: python:3.11-slim
    working_dir: /workspace
    volumes:
      - ../apps/py-analytics:/workspace
    command: sh -c "pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      PORT: "8000"
    ports:
      - "8000:8000"

volumes:
  pgdata:
